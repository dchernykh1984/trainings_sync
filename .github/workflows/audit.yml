name: Security Audit

on:
  schedule:
    - cron: "0 9 * * 6" # every Saturday at 09:00 UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Export dependencies
        run: uv export --no-hashes --no-annotate --no-default-groups --no-emit-project -o requirements.txt
      - name: Run pip-audit
        run: uvx pip-audit -r requirements.txt
